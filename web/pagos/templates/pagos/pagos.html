{% extends "WebApp/estructura.html" %} {% load static %} {% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <h1 class="mb-4" style="color: var(--color-olive-dark)">
        Pago con PayPal (Sandbox)
      </h1>
      <p class="text-muted">
        Este ejemplo crea una orden de MXN $100.00 y la captura al aprobar.
      </p>

      <div class="card-mattel p-4">
        <div id="paypal-button-container"></div>
        <div id="result" class="mt-3 small text-muted"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.paypal.com/sdk/js?client-id={{ paypal_client_id }}&currency=MXN"></script>
<script>
  function setResult(text, isError) {
    const el = document.getElementById("result");
    el.textContent = text;
    el.style.color = isError ? "#D35400" : "#2E8B57";
  }

  paypal
    .Buttons({
      createOrder: async () => {
        const resp = await fetch("/api/paypal/create-order", {
          method: "POST",
        });
        if (!resp.ok) {
          setResult("Error al crear la orden", true);
          throw new Error("create-order failed");
        }
        const data = await resp.json();
        return data.id;
      },
      onApprove: async (data) => {
        const resp = await fetch("/pagar/capture-order", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ orderID: data.orderID }),
        });
        if (!resp.ok) {
          setResult("Error al capturar el pago", true);
          return;
        }
        const capture = await resp.json();
        // ✅ Redirige a la vista de confirmación
        window.location.href = capture.redirect;
      },
      onError: (err) => {
        console.error(err);
        setResult("Error en el flujo de pago", true);
      },
    })
    .render("#paypal-button-container");
</script>
{% endblock %}
